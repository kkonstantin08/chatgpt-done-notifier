<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChatGPT Done Notifier</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <img src="../assets/icons/icon48.png" alt="" class="popup-icon" />
        <div>
          <h1>ChatGPT Done Notifier</h1>
          <p>Desktop alerts when a ChatGPT reply really finishes.</p>
        </div>
      </header>

      <section class="panel">
        <label class="row row-toggle">
          <span>Extension enabled</span>
          <input id="enabled" type="checkbox" />
        </label>

        <label class="field">
          <span>Notification mode</span>
          <select id="notification-mode">
            <option value="desktop">Desktop notification only</option>
            <option value="desktop_sound">Desktop notification + sound</option>
          </select>
        </label>

        <label class="row row-toggle">
          <span>Suppress while viewing ChatGPT</span>
          <input id="suppress-active" type="checkbox" />
        </label>
      </section>

      <section class="panel panel-muted">
        <div class="summary-row">
          <span>Quiet hours</span>
          <strong id="quiet-hours-summary">Off</strong>
        </div>
        <p class="help">
          Monitoring works only while a ChatGPT tab remains open.
        </p>
      </section>

      <section class="actions">
        <button id="test-notification" class="button button-primary" type="button">Test notification</button>
        <button id="open-options" class="button" type="button">Open settings</button>
      </section>

      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>
    <script src="./popup.js"></script>
  </body>
  </html>
